<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings | AlertX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0b0e14; color: white; transition: 0.3s; }
        body.light-mode { background: #f3f4f6; color: #1f2937; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        body.light-mode .glass { background: white; border: 1px solid rgba(0,0,0,0.1); shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 glass border-r border-white/5 p-6 flex flex-col justify-between">
        <nav class="space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-3 rounded-lg text-gray-500"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h2 class="text-4xl font-black italic uppercase text-red-600 mb-10">System Settings</h2>

        <div class="max-w-xl space-y-6">
            <div class="glass p-8 rounded-3xl flex justify-between items-center border border-white/10">
                <div>
                    <h3 class="font-bold text-lg">Appearance</h3>
                    <p class="text-xs text-gray-500">Switch between Dark and Light mode</p>
                </div>
                <div class="flex bg-black/20 p-1 rounded-xl">
                    <button onclick="setTheme('dark')" id="darkBtn" class="px-4 py-2 rounded-lg text-xs font-bold transition">Dark</button>
                    <button onclick="setTheme('light')" id="lightBtn" class="px-4 py-2 rounded-lg text-xs font-bold transition">White</button>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl border border-white/10">
                <h3 class="font-bold mb-4 uppercase text-xs tracking-widest text-red-500">Profile</h3>
                <div class="space-y-4">
                    <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                        <p class="text-[10px] text-gray-500 uppercase">Current User</p>
                        <p class="font-bold" id="sett-name"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function setTheme(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            }
            updateButtons();
        }
        // ================= GUEST PROFILE ID SYSTEM =================

// Generate unique Guest ID every new guest login
function generateGuestID() {
    return "GUEST-" + Math.floor(100000 + Math.random() * 900000);
}

// If user is Guest → assign ID
let role = localStorage.getItem("userRole");

if (role === "Guest") {
    let guestID = localStorage.getItem("guestID");

    // If no ID exists → create new
    if (!guestID) {
        guestID = generateGuestID();
        localStorage.setItem("guestID", guestID);
    }

    // Show name + ID
    document.getElementById('sett-name').innerText =
        (localStorage.getItem('userName') || "Guest User") + " (" + guestID + ")";
} else {
    // Normal users
    document.getElementById('sett-name').innerText =
        localStorage.getItem('userName');
}

        function updateButtons() {
            const isLight = localStorage.getItem('theme') === 'light';
            document.getElementById('lightBtn').className = isLight ? 'px-4 py-2 rounded-lg text-xs font-bold bg-white text-black shadow' : 'px-4 py-2 rounded-lg text-xs font-bold text-gray-500';
            document.getElementById('darkBtn').className = !isLight ? 'px-4 py-2 rounded-lg text-xs font-bold bg-red-600 text-white shadow' : 'px-4 py-2 rounded-lg text-xs font-bold text-gray-500';
        }

        // Initialize
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        document.getElementById('sett-name').innerText = localStorage.getItem('userName');
        updateButtons();
    </script>
</body>
</html>
