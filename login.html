<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AlertX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        @keyframes highlight {
            0% { border-color: rgba(220, 38, 38, 0); }
            50% { border-color: rgba(220, 38, 38, 1); }
            100% { border-color: rgba(255, 255, 255, 0.1); }
        }
        .pulse-border { animation: highlight 0.8s ease-out; }
    </style>
</head>

<body class="bg-[#0b0e14] text-white flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-md">
        <div class="glass p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">

            <h2 class="text-3xl font-black text-center mb-4 italic uppercase tracking-tighter">
                AlertX Login
            </h2>

            <div class="bg-white/5 border border-white/10 rounded-xl p-4 mb-6 text-sm text-gray-300">
                <p class="mb-2 font-bold text-white">Quick Fill (Demo):</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="fillFields('admin')" class="text-[10px] bg-red-600/20 border border-red-600/40 p-2 rounded-lg font-bold hover:bg-red-600/40 transition">FILL ADMIN</button>
                    <button onclick="fillFields('staff')" class="text-[10px] bg-blue-600/20 border border-blue-600/40 p-2 rounded-lg font-bold hover:bg-blue-600/40 transition">FILL STAFF</button>
                </div>
            </div>

            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" required
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-red-600 transition-all"
                    placeholder="Email">

                <input type="password" id="pass" required
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-red-600 transition-all"
                    placeholder="Password">

                <button type="submit"
                    class="w-full bg-red-600 py-4 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-red-900/20 active:scale-95 transition">
                    Sign In
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-[#0b0e14] px-2 text-gray-500">
                        Emergency Access
                    </span>
                </div>
            </div>

            <button onclick="guestLogin()"
                class="w-full glass py-4 rounded-xl font-bold border border-white/10 hover:bg-white/5 transition flex items-center justify-center gap-2">
                <span>Continue as Guest</span>
                <span class="text-xs bg-green-500/20 text-green-500 px-2 py-0.5 rounded">
                    Instant
                </span>
            </button>

        </div>
    </div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ Quick Fill (Demo)
window.fillFields = (role) => {
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('pass');

    emailInput.value = role === "admin" ? "admin@alertx.com" : "staff@alertx.com";
    passInput.value = "123456";

    [emailInput, passInput].forEach(el => {
        el.classList.remove('pulse-border');
        void el.offsetWidth;
        el.classList.add('pulse-border');
    });
};

// ✅ Guest Login
window.guestLogin = () => {
    localStorage.setItem('userRole', 'guest');
    localStorage.setItem('userName', 'Emergency Guest');
    localStorage.setItem('userEmail', 'guest@alertx.com');
    window.location.href = 'dashboard.html';
};

// ✅ Login Logic (Demo + Firebase)
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;

    // 🔴 DEMO LOGIN (NO FIREBASE)
    if (email === "admin@alertx.com" && password === "123456") {
        localStorage.setItem('userRole', 'admin');
        localStorage.setItem('userName', 'Admin Demo');
        localStorage.setItem('userEmail', email);
        window.location.href = 'dashboard.html';
        return;
    }

    if (email === "staff@alertx.com" && password === "123456") {
        localStorage.setItem('userRole', 'staff');
        localStorage.setItem('userName', 'Staff Demo');
        localStorage.setItem('userEmail', email);
        window.location.href = 'dashboard.html';
        return;
    }

    // 🔵 FIREBASE LOGIN (REAL USERS)
    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const userDoc = await getDoc(doc(db, "users", user.uid));

        if (userDoc.exists()) {
            const userData = userDoc.data();

            localStorage.setItem('userRole', userData.role);
            localStorage.setItem('userName', userData.name);
            localStorage.setItem('userEmail', userData.email);

            window.location.href = 'dashboard.html';
        } else {
            alert("User record not found in database.");
        }

    } catch (err) {
        alert("Login Failed: " + err.message);
    }
});
</script>

</body>
</html>
