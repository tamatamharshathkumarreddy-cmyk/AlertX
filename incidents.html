<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incidents | AlertX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .sidebar-link { border-left: 3px solid transparent; transition: all 0.3s; }
        .sidebar-link-active { background: rgba(220, 38, 38, 0.1); border-left-color: #dc2626; color: white !important; }
    </style>
</head>

<body class="bg-[#0b0e14] text-white flex h-screen overflow-hidden">

<aside class="w-72 glass border-r border-white/5 p-6 flex flex-col justify-between">
    <div>
        <div class="flex items-center gap-3 mb-10 font-bold italic text-xl">AlertX</div>
        <nav class="space-y-2">
            <a href="dashboard.html" class="sidebar-link p-3 text-gray-500">Dashboard</a>
            <a href="incidents.html" class="sidebar-link-active sidebar-link p-3">Incidents</a>
        </nav>
    </div>
</aside>

<main class="flex-1 overflow-y-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-black text-red-600">Live Incidents</h2>
        <div>Active: <span id="activeCount">0</span></div>
    </div>

    <div id="incidentContainer" class="space-y-4 pb-20"></div>
</main>

<!-- ✅ Scroll Button -->
<button id="scrollDownBtn" 
    class="hidden fixed bottom-6 right-6 bg-red-600 hover:bg-red-700 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-xl transition">
    ↓
</button>

<script>

// 🔔 Notifications
if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
}

function notify(msg) {
    if (Notification.permission === "granted") {
        new Notification("AlertX", { body: msg });
    }
}

// 🔄 Load incidents
function loadIncidents() {
    let incidents = JSON.parse(localStorage.getItem("incidents")) || [];
    const container = document.getElementById("incidentContainer");
    container.innerHTML = "";

    let active = 0;

    incidents.forEach((inc, index) => {

        if (inc.status !== "Resolved") active++;

        container.innerHTML += `
        <div class="glass p-6 rounded-3xl flex justify-between items-center">
            <div>
                <h4 class="font-bold">${inc.type}</h4>
                <p class="text-xs text-gray-400">${inc.zone || "Zone A"} • ${inc.reporter}</p>
                <p id="status${index}" class="mt-2 text-sm ${
                    inc.status === "Resolved" ? "text-green-400" :
                    inc.status === "Pending" ? "text-yellow-400" :
                    "text-red-400"
                }">
                    Status: ${inc.status}
                </p>
            </div>

            <button onclick="handleResponse(${index})"
                class="px-4 py-2 rounded-xl text-xs font-bold
                ${
                    inc.status === "Resolved" ? "bg-green-600" :
                    inc.status === "Pending" ? "bg-yellow-500" :
                    "bg-red-600"
                }">
                ${
                    inc.status === "Resolved" ? "Resolved" :
                    inc.status === "Pending" ? "Mark Resolved" :
                    "Respond Now"
                }
            </button>
        </div>`;
    });

    document.getElementById("activeCount").innerText = active;

    toggleScrollBtn();
}

// 🔁 Status Change Logic
function handleResponse(index) {
    let incidents = JSON.parse(localStorage.getItem("incidents"));

    if (incidents[index].status === "Active") {
        incidents[index].status = "Pending";
        notify("🚑 Responding to incident");
    }
    else if (incidents[index].status === "Pending") {
        incidents[index].status = "Resolved";
        notify("✅ Incident resolved");
    }

    localStorage.setItem("incidents", JSON.stringify(incidents));
    loadIncidents();
}

// ================= SCROLL BUTTON =================

// Show button only if scroll exists
function toggleScrollBtn() {
    const btn = document.getElementById("scrollDownBtn");
    const scrollable = document.documentElement.scrollHeight > window.innerHeight;
    btn.classList.toggle("hidden", !scrollable);
}

// Smart toggle (↓ / ↑)
window.addEventListener("scroll", () => {
    const btn = document.getElementById("scrollDownBtn");

    if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 10) {
        btn.innerText = "↑";
        btn.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
        btn.innerText = "↓";
        btn.onclick = () => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }
});

// ================= AUTO SYNC =================

// Refresh every 2 sec
setInterval(loadIncidents, 2000);

// Initial load
loadIncidents();

// Detect changes from other tabs/pages
window.addEventListener("storage", () => {
    notify("🚨 New Incident Received");
    loadIncidents();
});

</script>

</body>
</html>
